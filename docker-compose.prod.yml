# Production Docker Compose with HTTPS
version: '3.8'

services:
  # Production Screen Dreams Application
  screen-dreams:
    build: .
    container_name: screen-dreams-app
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - DATABASE_URL=postgresql://screenwriter:${DB_PASSWORD}@postgres:5432/screenwriter_db
      - REDIS_URL=redis://redis:6379/0
      - RATELIMIT_STORAGE_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - FORCE_HTTPS=True
      - PREFERRED_URL_SCHEME=https
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
      - ./screenplays:/app/screenplays
      - ./logs:/var/log/screen-dreams
      - ./backups:/opt/backups/screen-dreams
    depends_on:
      - postgres
      - redis
    networks:
      - screen-dreams-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: screen-dreams-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=screenwriter_db
      - POSTGRES_USER=screenwriter
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    networks:
      - screen-dreams-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screenwriter -d screenwriter_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: screen-dreams-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - screen-dreams-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Ollama for Local AI (Optional)
  ollama:
    image: ollama/ollama:latest
    container_name: screen-dreams-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - screen-dreams-network
    profiles:
      - ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Reverse Proxy with HTTPS
  nginx:
    image: nginx:alpine
    container_name: screen-dreams-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-https.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/https-default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/var/www/static
      - ./docker/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - screen-dreams
    networks:
      - screen-dreams-network

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: screen-dreams-backup
    restart: unless-stopped
    environment:
      - POSTGRES_DB=screenwriter_db
      - POSTGRES_USER=screenwriter
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
    networks:
      - screen-dreams-network
    command: |
      sh -c "
      while true; do
        echo 'Creating backup...'
        pg_dump -h postgres -U screenwriter -d screenwriter_db > /backups/backup_$(date +%Y%m%d_%H%M%S).sql
        find /backups -name 'backup_*.sql' -mtime +30 -delete
        echo 'Backup completed. Next backup in 24 hours.'
        sleep 86400
      done
      "
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

networks:
  screen-dreams-network:
    driver: bridge
