<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
</head>
<body>
    <h1>Test Registration Form</h1>
    
    <form action="{{ url_for('security.register') }}" method="POST">
        {{ register_user_form.hidden_tag() }}
        
        <div>
            <label for="email">Email:</label>
            {{ register_user_form.email() }}
        </div>
        
        <div>
            <label for="password">Password:</label>
            {{ register_user_form.password() }}
        </div>
        
        <div>
            <button type="submit">Register</button>
        </div>
    </form>
    
    <hr>
    
    <form action="{{ url_for('main.debug_register_test') }}" method="POST">
        <div>
            <label for="email">Email:</label>
            <input type="text" name="email" value="test@example.com">
        </div>
        
        <div>
            <label for="password">Password:</label>
            <input type="password" name="password" value="test123456">
        </div>
        
        <div>
            <button type="submit">Test Debug Route</button>
        </div>
    </form>
    
    <div id="debug-info"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const forms = document.querySelectorAll('form');
            forms.forEach(form => {
                form.addEventListener('submit', function(e) {
                    console.log('Form submitted:', form.action);
                    document.getElementById('debug-info').innerHTML += '<p>Form submitted to: ' + form.action + '</p>';
                });
            });
        });
    </script>
</body>
</html>
