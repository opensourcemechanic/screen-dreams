<!DOCTYPE html>
<html>
<head>
    <title>Test Form</title>
</head>
<body>
    <h1>Test Form Submission</h1>
    
    <form action="{{ url_for('simple_auth.test_form') }}" method="POST">
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="test@example.com">
        </div>
        
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" value="test123456">
        </div>
        
        <div>
            <button type="submit">Submit Test</button>
        </div>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    '<h3>Success!</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(error => {
                document.getElementById('result').innerHTML = 
                    '<h3>Error:</h3><pre>' + error + '</pre>';
            });
        });
    </script>
</body>
</html>
