# Development Docker Compose
version: '3.8'

services:
  # Development Screen Dreams Application
  screen-dreams-dev:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: screen-dreams-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - DATABASE_URL=sqlite:///screenwriter_dev.db
      - REDIS_URL=redis://redis-dev:6379/0
      - RATELIMIT_STORAGE_URL=redis://redis-dev:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - AI_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama-dev:11434
      - OLLAMA_MODEL=llama2
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./screenplays:/app/screenplays
      - ./logs:/var/log/screen-dreams
    depends_on:
      - redis-dev
    networks:
      - screen-dreams-dev-network
    command: python run_dev.py

  # Redis for Development
  redis-dev:
    image: redis:7-alpine
    container_name: screen-dreams-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    networks:
      - screen-dreams-dev-network

  # Ollama for Development (Optional)
  ollama-dev:
    image: ollama/ollama:latest
    container_name: screen-dreams-ollama-dev
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - screen-dreams-dev-network
    profiles:
      - ai

volumes:
  redis_dev_data:
    driver: local
  ollama_dev_data:
    driver: local

networks:
  screen-dreams-dev-network:
    driver: bridge
